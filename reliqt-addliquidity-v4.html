<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reliqt — Add Liquidity V4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0a0e1a;
    --bg2: #0f1424;
    --bg3: #141928;
    --border: #1e2640;
    --blue: #3b82f6;
    --blue2: #1d4ed8;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 720px; margin: 0 auto; }

  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .logo {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .diamonds {
    display: flex;
    gap: 3px;
  }

  .diamond {
    width: 10px;
    height: 10px;
    background: var(--blue);
    transform: rotate(45deg);
  }

  .diamond:nth-child(2) { background: #60a5fa; }
  .diamond:nth-child(3) { background: #93c5fd; }

  .logo-text {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--white);
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 0.4rem;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
  }

  /* Wallet bar */
  .wallet-bar {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .wallet-info { display: flex; flex-direction: column; gap: 0.2rem; }
  .wallet-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .wallet-addr { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--text); }

  .btn {
    padding: 0.55rem 1.25rem;
    border-radius: 8px;
    border: none;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-blue { background: var(--blue); color: white; }
  .btn-blue:hover { background: var(--blue2); }
  .btn-blue:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-green { background: var(--green); color: white; }
  .btn-green:hover { background: #16a34a; }
  .btn-green:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-outline:hover { border-color: var(--blue); color: var(--blue); }

  /* Config card */
  .config-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .config-title {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .config-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .config-item label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 0.35rem;
  }

  .config-item input, .config-item select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.55rem 0.75rem;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    outline: none;
  }

  .config-item input:focus, .config-item select:focus {
    border-color: var(--blue);
  }

  /* Token list */
  .tokens-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
  }

  .tokens-title {
    font-size: 0.8rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  .token-row {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.9rem 1.1rem;
    margin-bottom: 0.6rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: border-color 0.2s;
  }

  .token-row.processing { border-color: var(--yellow); }
  .token-row.success { border-color: var(--green); }
  .token-row.failed { border-color: var(--red); }

  .token-check {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    background: var(--bg3);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .token-check.checked {
    background: var(--blue);
    border-color: var(--blue);
  }

  .token-check.checked::after {
    content: '✓';
    color: white;
    font-size: 11px;
    font-weight: 700;
  }

  .token-info { flex: 1; }

  .token-name {
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--white);
    margin-bottom: 0.2rem;
  }

  .token-ca {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
  }

  .token-status {
    font-size: 0.78rem;
    font-weight: 600;
    padding: 0.25rem 0.6rem;
    border-radius: 20px;
    white-space: nowrap;
  }

  .status-idle { background: var(--bg3); color: var(--muted); }
  .status-pending { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .status-approving { background: rgba(59,130,246,0.15); color: var(--blue); }
  .status-adding { background: rgba(59,130,246,0.15); color: var(--blue); }
  .status-done { background: rgba(34,197,94,0.15); color: var(--green); }
  .status-failed { background: rgba(239,68,68,0.15); color: var(--red); }

  /* Action bar */
  .action-bar {
    display: flex;
    gap: 0.75rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }

  /* Log */
  .log-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-top: 1.5rem;
    overflow: hidden;
  }

  .log-header {
    padding: 0.75rem 1.1rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .log-body {
    padding: 0.75rem 1rem;
    max-height: 280px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    line-height: 1.7;
  }

  .log-line { margin-bottom: 0.1rem; }
  .log-line.info { color: var(--text); }
  .log-line.success { color: var(--green); }
  .log-line.error { color: var(--red); }
  .log-line.warn { color: var(--yellow); }
  .log-line.muted { color: var(--muted); }

  /* Progress */
  .progress-bar-wrap {
    background: var(--bg3);
    border-radius: 4px;
    height: 4px;
    margin-top: 1.2rem;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 4px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Summary */
  .summary {
    display: none;
    background: var(--bg2);
    border: 1px solid var(--green);
    border-radius: 12px;
    padding: 1.25rem;
    margin-top: 1.5rem;
  }

  .summary.show { display: block; }
  .summary-title { color: var(--green); font-weight: 700; font-size: 1rem; margin-bottom: 0.75rem; }
  .summary-item { font-size: 0.82rem; color: var(--text); margin-bottom: 0.3rem; }
  .summary-item a { color: var(--blue); text-decoration: none; }
  .summary-item a:hover { text-decoration: underline; }

  @media (max-width: 520px) {
    .config-grid { grid-template-columns: 1fr; }
    .wallet-bar { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="diamonds">
        <div class="diamond"></div>
        <div class="diamond"></div>
        <div class="diamond"></div>
        <div class="diamond"></div>
        <div class="diamond"></div>
        <div class="diamond"></div>
      </div>
      <span class="logo-text">RELIQT</span>
    </div>
    <h1>Add Liquidity — Uniswap V4</h1>
    <p class="subtitle">Add rTOKEN / $RELIQT pairs on Base Mainnet — $10 per pair</p>
  </div>

  <!-- Wallet Bar -->
  <div class="wallet-bar">
    <div class="wallet-info">
      <span class="wallet-label">Wallet</span>
      <span class="wallet-addr" id="walletAddr">Not connected</span>
    </div>
    <div style="display:flex;gap:0.5rem;align-items:center">
      <span id="usdcBalance" style="font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:#64748b"></span>
      <button class="btn btn-blue" id="connectBtn" onclick="connectWallet()">Connect Wallet</button>
    </div>
  </div>

  <!-- Config -->
  <div class="config-card">
    <div class="config-title">Configuration</div>
    <div class="config-grid">
      <div class="config-item">
        <label>$RELIQT per Token Pair</label>
        <input type="number" id="usdcAmount" value="10" min="1" step="1" />
      </div>
      <div class="config-item">
        <label>Fee Tier</label>
        <select id="feeTier">
          <option value="3000">0.3% (Standard)</option>
          <option value="500">0.05% (Stable)</option>
          <option value="10000">1% (Exotic)</option>
        </select>
      </div>
      <div class="config-item">
        <label>Tick Lower</label>
        <input type="number" id="tickLower" value="-887272" />
      </div>
      <div class="config-item">
        <label>Tick Upper</label>
        <input type="number" id="tickUpper" value="887272" />
      </div>
    </div>
  </div>

  <!-- Token List -->
  <div class="tokens-header">
    <span class="tokens-title">7 Tokens — Base Mainnet</span>
    <div style="display:flex;gap:0.5rem">
      <button class="btn btn-outline" style="font-size:0.75rem;padding:0.3rem 0.75rem" onclick="selectAll(true)">All</button>
      <button class="btn btn-outline" style="font-size:0.75rem;padding:0.3rem 0.75rem" onclick="selectAll(false)">None</button>
    </div>
  </div>

  <div id="tokenList"></div>

  <!-- Progress -->
  <div class="progress-bar-wrap" id="progressWrap" style="display:none">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>

  <!-- Action Bar -->
  <div class="action-bar">
    <button class="btn btn-green" id="runBtn" onclick="runAll()" disabled>
      ▶ Add Liquidity to All Selected
    </button>
    <button class="btn btn-outline" onclick="resetAll()">Reset</button>
  </div>

  <!-- Log -->
  <div class="log-card">
    <div class="log-header">
      <span>Transaction Log</span>
      <span id="logCount" style="color:var(--muted)">0 events</span>
    </div>
    <div class="log-body" id="logBody">
      <div class="log-line muted">— Waiting for wallet connection...</div>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary" id="summary">
    <div class="summary-title">✓ Liquidity Added Successfully</div>
    <div id="summaryContent"></div>
  </div>

</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const RELIQT = '0xB95fBdDa7787DB5835A63E72e42ee19a0a419ba3'; // $RELIQT token
const USDC = RELIQT; // alias for compatibility
const BASE_CHAIN_ID = '0x2105'; // 8453

// Uniswap V4 PoolManager on Base
const POOL_MANAGER = '0x498581ff718922c3f8e6a244956af099b2652b2b';

// Position Manager (NonfungiblePositionManager style for V4)
// Using UniversalRouter / PositionManager for V4
const POSITION_MANAGER = '0x7C5f5A4bBd8fD63184577525326123B519429bDc';

const TOKENS = [
  { symbol: 'rLEBRON',    name: 'LeBron James RC',         ca: '0x2e3b2b122bae8B2cb325C2cb2C414854927f44a5' },
  { symbol: 'rCHARIZARD', name: 'Charizard Base Set',      ca: '0x22Ac18Fd398e3040FE61854229ff1e4265F57902' },
  { symbol: 'rPIKACHU',   name: 'Pikachu CD Promo',        ca: '0x6b97a7dCDE79d5Fa80FfC9774925A09c2Af2dd63' },
  { symbol: 'rMAHOMES',   name: 'Patrick Mahomes RC',       ca: '0x9e89159aB6763baed111980A809D53663D2c35b4' },
  { symbol: 'rHAALAND',   name: 'Erling Haaland RC',       ca: '0xaE67C945523F03BE4bd1fC32888161447a75ef13' },
  { symbol: 'rMEWTWO',    name: 'Mewtwo Holo 1st Ed',      ca: '0xc2cfC8889Bf71b068AE51E4dC33ecA9f2B57479B' },
  { symbol: 'rWEMBY',     name: 'Wembanyama RC',           ca: '0xBd057659a966BC7acfE26798FcB320595C553754' },
];

// ERC20 ABI (minimal)
const ERC20_ABI = [
  '0x095ea7b3', // approve(address,uint256)
  '0x70a08231', // balanceOf(address)
  '0xdd62ed3e', // allowance(owner,spender)
];

// ============================================================
let account = null;
let selected = new Set(TOKENS.map((_, i) => i));
let statuses = TOKENS.map(() => 'idle');
let txHashes = TOKENS.map(() => null);
let logLines = [];
let running = false;

// ============================================================
// RENDER
// ============================================================
function renderTokens() {
  const list = document.getElementById('tokenList');
  list.innerHTML = TOKENS.map((t, i) => `
    <div class="token-row ${statuses[i] === 'done' ? 'success' : statuses[i] === 'failed' ? 'failed' : statuses[i] === 'adding' || statuses[i] === 'approving' ? 'processing' : ''}" id="row-${i}">
      <div class="token-check ${selected.has(i) ? 'checked' : ''}" onclick="toggleSelect(${i})"></div>
      <div class="token-info">
        <div class="token-name">${t.symbol} <span style="font-weight:400;font-size:0.8rem;color:var(--muted)">— ${t.name}</span></div>
        <div class="token-ca">${t.ca}</div>
        ${txHashes[i] ? `<div style="margin-top:0.3rem"><a href="https://basescan.org/tx/${txHashes[i]}" target="_blank" style="font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:var(--blue)">View on BaseScan ↗</a></div>` : ''}
      </div>
      <span class="token-status ${getStatusClass(statuses[i])}">${getStatusLabel(statuses[i])}</span>
    </div>
  `).join('');
}

function getStatusClass(s) {
  return { idle: 'status-idle', pending: 'status-pending', approving: 'status-approving', adding: 'status-adding', done: 'status-done', failed: 'status-failed' }[s] || 'status-idle';
}

function getStatusLabel(s) {
  return { idle: 'Ready', pending: 'Pending', approving: 'Approving...', adding: 'Adding...', done: '✓ Done', failed: '✗ Failed' }[s] || s;
}

function toggleSelect(i) {
  if (running) return;
  if (selected.has(i)) selected.delete(i);
  else selected.add(i);
  renderTokens();
}

function selectAll(val) {
  if (running) return;
  selected = val ? new Set(TOKENS.map((_, i) => i)) : new Set();
  renderTokens();
}

// ============================================================
// LOG
// ============================================================
function log(msg, type = 'info') {
  const time = new Date().toLocaleTimeString('en-US', { hour12: false });
  logLines.push({ msg: `[${time}] ${msg}`, type });
  const body = document.getElementById('logBody');
  body.innerHTML = logLines.map(l => `<div class="log-line ${l.type}">${l.msg}</div>`).join('');
  body.scrollTop = body.scrollHeight;
  document.getElementById('logCount').textContent = `${logLines.length} events`;
}

// ============================================================
// WALLET
// ============================================================
async function connectWallet() {
  if (!window.ethereum) { alert('MetaMask not found!'); return; }
  try {
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    account = accounts[0];

    // Switch to Base
    try {
      await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: BASE_CHAIN_ID }] });
    } catch (e) {
      if (e.code === 4902) {
        await window.ethereum.request({
          method: 'wallet_addEthereumChain',
          params: [{ chainId: BASE_CHAIN_ID, chainName: 'Base', nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 }, rpcUrls: ['https://mainnet.base.org'], blockExplorerUrls: ['https://basescan.org'] }]
        });
      }
    }

    const short = account.slice(0, 6) + '...' + account.slice(-4);
    document.getElementById('walletAddr').textContent = short;
    document.getElementById('connectBtn').textContent = 'Connected ✓';
    document.getElementById('connectBtn').disabled = true;
    document.getElementById('runBtn').disabled = false;

    await fetchUSDCBalance();
    log(`Wallet connected: ${account}`, 'success');
  } catch (e) {
    log('Connection failed: ' + e.message, 'error');
  }
}

async function fetchUSDCBalance() {
  try {
    const data = '0x70a08231' + account.replace('0x', '').padStart(64, '0');
    const res = await window.ethereum.request({
      method: 'eth_call',
      params: [{ to: USDC, data }, 'latest']
    });
    const bal = parseInt(res, 16) / 1e18;
    document.getElementById('usdcBalance').textContent = `${bal.toFixed(2)} $RELIQT`;
    log(`$RELIQT balance: ${bal.toFixed(2)}`, 'info');
  } catch (e) {
    log('Could not fetch $RELIQT balance', 'warn');
  }
}

// ============================================================
// APPROVE USDC
// ============================================================
async function approveUSDC(spender, amountUsdc) {
  const amount = BigInt(Math.floor(amountUsdc * 1e18));
  const amountHex = amount.toString(16).padStart(64, '0');
  const spenderHex = spender.replace('0x', '').padStart(64, '0');
  const data = '0x095ea7b3' + spenderHex + amountHex;

  const txHash = await window.ethereum.request({
    method: 'eth_sendTransaction',
    params: [{ from: account, to: USDC, data, gas: '0x186A0' }]
  });
  return txHash;
}

// ============================================================
// WAIT FOR TX
// ============================================================
async function waitForTx(txHash, timeout = 120000) {
  const start = Date.now();
  while (Date.now() - start < timeout) {
    const receipt = await window.ethereum.request({
      method: 'eth_getTransactionReceipt',
      params: [txHash]
    });
    if (receipt) return receipt;
    await sleep(3000);
  }
  throw new Error('Transaction timeout');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ============================================================
// ADD LIQUIDITY — Uniswap V4 via PoolManager
// ============================================================
async function addLiquidityV4(tokenCA, amountUsdc, feeTier, tickLower, tickUpper) {
  // Sort tokens (token0 < token1 by address)
  const token0 = tokenCA.toLowerCase() < USDC.toLowerCase() ? tokenCA : USDC;
  const token1 = tokenCA.toLowerCase() < USDC.toLowerCase() ? USDC : tokenCA;

  const amount0 = amountUsdc / 2; // split 50/50
  const amount1 = amountUsdc / 2;

  const amount0Wei = BigInt(Math.floor(amount0 * 1e18)).toString(16).padStart(64, '0');
  const amount1Wei = BigInt(Math.floor(amount1 * 1e18)).toString(16).padStart(64, '0');

  // V4 uses PoolKey struct: {token0, token1, fee, tickSpacing, hooks}
  // Encode modifyLiquidity call
  // Function: modifyLiquidity(PoolKey, IPoolManager.ModifyLiquidityParams, bytes)
  // PoolKey: (address currency0, address currency1, uint24 fee, int24 tickSpacing, address hooks)
  // ModifyLiquidityParams: (int24 tickLower, int24 tickUpper, int256 liquidityDelta, bytes32 salt)

  const tickSpacing = feeTier === 500 ? 10 : feeTier === 3000 ? 60 : 200;
  const liquidityDelta = BigInt('1000000000000000000'); // 1e18 initial liquidity units

  // ABI-encode the call manually
  // selector for modifyLiquidity(PoolKey,(int24,int24,int256,bytes32),bytes)
  const selector = '0x9af1d35a';

  function toBytes32(n) { return BigInt(n).toString(16).replace('-', '').padStart(64, '0'); }
  function toAddress(a) { return a.replace('0x', '').padStart(64, '0'); }
  function toInt24(n) {
    let v = BigInt(n);
    if (v < 0n) v = (1n << 256n) + v;
    return v.toString(16).padStart(64, '0');
  }
  function toUint(n, bits = 256) {
    return BigInt(n).toString(16).padStart(64, '0');
  }

  // PoolKey (5 params)
  const pk_currency0 = toAddress(token0);
  const pk_currency1 = toAddress(token1);
  const pk_fee = toUint(feeTier);
  const pk_tickSpacing = toUint(tickSpacing);
  const pk_hooks = toAddress('0x0000000000000000000000000000000000000000');

  // ModifyLiquidityParams (4 params)
  const ml_tickLower = toInt24(tickLower);
  const ml_tickUpper = toInt24(tickUpper);
  const ml_liquidityDelta = toBytes32(liquidityDelta);
  const ml_salt = '0'.padStart(64, '0');

  // bytes hookData = empty => offset + length
  const bytesOffset = toUint(7 * 32); // offset to bytes param (after PoolKey 5 words + ModifyLiq 4 words = 9 words... actually inline struct)
  // V4 PoolKey is a tuple, encoded inline. Let's encode offset properly.
  // Actually for simplicity encode data and offset for the bytes param
  const emptyBytesOffset = toUint(9 * 32); // offset = 9 slots * 32
  const emptyBytesLen = toUint(0);

  const data = selector
    + pk_currency0
    + pk_currency1
    + pk_fee
    + pk_tickSpacing
    + pk_hooks
    + ml_tickLower
    + ml_tickUpper
    + ml_liquidityDelta
    + ml_salt
    + emptyBytesOffset
    + emptyBytesLen;

  const txHash = await window.ethereum.request({
    method: 'eth_sendTransaction',
    params: [{
      from: account,
      to: POOL_MANAGER,
      data,
      gas: '0x493E0', // 300000
    }]
  });

  return txHash;
}

// ============================================================
// RUN ALL
// ============================================================
async function runAll() {
  if (!account) { alert('Connect wallet first!'); return; }
  if (running) return;

  const toProcess = [...selected].filter(i => statuses[i] !== 'done');
  if (toProcess.length === 0) { log('All selected tokens already done.', 'warn'); return; }

  running = true;
  document.getElementById('runBtn').disabled = true;
  document.getElementById('progressWrap').style.display = 'block';

  const usdcAmount = parseFloat(document.getElementById('usdcAmount').value) || 10;
  const feeTier = parseInt(document.getElementById('feeTier').value);
  const tickLower = parseInt(document.getElementById('tickLower').value);
  const tickUpper = parseInt(document.getElementById('tickUpper').value);

  let done = 0;

  log(`Starting liquidity add for ${toProcess.length} tokens @ ${usdcAmount} $RELIQT each`, 'info');
  log(`Fee tier: ${feeTier/10000}% | Ticks: [${tickLower}, ${tickUpper}]`, 'muted');

  for (const i of toProcess) {
    const t = TOKENS[i];
    log(`─────────────────────────────`, 'muted');
    log(`Processing ${t.symbol} (${t.ca.slice(0,10)}...)`, 'info');

    try {
      // Step 1: Approve USDC for PositionManager
      statuses[i] = 'approving';
      renderTokens();
      log(`[${t.symbol}] Approving USDC...`, 'info');

      const approveTx = await approveUSDC(POSITION_MANAGER, usdcAmount + 1);
      log(`[${t.symbol}] Approve tx: ${approveTx.slice(0,20)}...`, 'success');

      log(`[${t.symbol}] Waiting for approval confirmation...`, 'muted');
      const approveReceipt = await waitForTx(approveTx);
      if (approveReceipt.status !== '0x1') throw new Error('Approval failed');
      log(`[${t.symbol}] USDC approved ✓`, 'success');

      // Step 2: Add liquidity
      statuses[i] = 'adding';
      renderTokens();
      log(`[${t.symbol}] Adding liquidity to V4 pool...`, 'info');

      const addTx = await addLiquidityV4(t.ca, usdcAmount, feeTier, tickLower, tickUpper);
      txHashes[i] = addTx;
      log(`[${t.symbol}] Add tx: ${addTx.slice(0,20)}...`, 'success');

      log(`[${t.symbol}] Waiting for confirmation...`, 'muted');
      const addReceipt = await waitForTx(addTx);
      if (addReceipt.status !== '0x1') throw new Error('Add liquidity tx reverted');

      statuses[i] = 'done';
      log(`[${t.symbol}] Liquidity added ✓ — ${usdcAmount} $RELIQT pair live!`, 'success');

    } catch (e) {
      statuses[i] = 'failed';
      log(`[${t.symbol}] FAILED: ${e.message}`, 'error');
    }

    done++;
    document.getElementById('progressFill').style.width = `${(done / toProcess.length) * 100}%`;
    renderTokens();
    await sleep(1500);
  }

  running = false;
  document.getElementById('runBtn').disabled = false;

  const successCount = toProcess.filter(i => statuses[i] === 'done').length;
  log(`─────────────────────────────`, 'muted');
  log(`Done! ${successCount}/${toProcess.length} pools liquidity added.`, successCount === toProcess.length ? 'success' : 'warn');

  if (successCount > 0) showSummary(toProcess.filter(i => statuses[i] === 'done'));
}

function showSummary(successIndexes) {
  const summary = document.getElementById('summary');
  const content = document.getElementById('summaryContent');
  const usdcAmount = parseFloat(document.getElementById('usdcAmount').value) || 10;

  content.innerHTML = successIndexes.map(i => {
    const t = TOKENS[i];
    return `<div class="summary-item">✓ ${t.symbol} — ${usdcAmount} $RELIQT liquidity added
      ${txHashes[i] ? `<a href="https://basescan.org/tx/${txHashes[i]}" target="_blank"> [BaseScan ↗]</a>` : ''}
    </div>`;
  }).join('');

  content.innerHTML += `<div class="summary-item" style="margin-top:0.75rem;color:var(--muted)">
    Check pools on <a href="https://app.uniswap.org/pool" target="_blank">Uniswap App ↗</a> or <a href="https://dexscreener.com/base" target="_blank">DexScreener ↗</a>
  </div>`;

  summary.classList.add('show');
}

function resetAll() {
  if (running) return;
  statuses = TOKENS.map(() => 'idle');
  txHashes = TOKENS.map(() => null);
  logLines = [];
  document.getElementById('logBody').innerHTML = '<div class="log-line muted">— Reset complete. Ready to run.</div>';
  document.getElementById('logCount').textContent = '0 events';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('progressWrap').style.display = 'none';
  document.getElementById('summary').classList.remove('show');
  selected = new Set(TOKENS.map((_, i) => i));
  renderTokens();
}

// Init
renderTokens();
log('Script loaded. Connect wallet to begin.', 'muted');
log('Network: Base Mainnet (Chain ID 8453)', 'muted');
log('DEX: Uniswap V4 PoolManager', 'muted');
log('Pair: rTOKEN / $RELIQT (0xB95f...9ba3)', 'muted');
</script>
